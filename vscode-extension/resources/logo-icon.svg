<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Neon Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (Slightly smaller to fit rounded corners) -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)" />

  <!-- Shield/Forge Shape Outline with Cyan Glow -->
  <path d="M 50 15 L 80 30 L 80 60 L 50 85 L 20 60 L 20 30 Z" 
        fill="none" 
        stroke="url(#cyanGrad)" 
        stroke-width="4" 
        filter="url(#neonGlow)" />

  <!-- Inner Hammer / Forge Core with Purple Glow -->
  <path d="M 42 32 H 58 V 40 H 52 V 60 H 48 V 40 H 42 Z" 
        fill="url(#purpleGrad)" 
        filter="url(#neonGlow)" />

  <!-- Shield Inner Accent Line -->
  <path d="M 50 22 L 72 34 L 72 56 L 50 75 L 28 56 L 28 34 Z" 
        fill="none" 
        stroke="url(#purpleGrad)" 
        stroke-width="1.5" 
        stroke-dasharray="4 2" />

  <!-- E Letter Motif -->
  <text x="50" y="52" 
        font-family="'Inter', sans-serif, system-ui" 
        font-size="16" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle" 
        alignment-baseline="middle" 
        letter-spacing="1">E</text>
</svg>
